name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train demo models
        run: python models/train_model.py

      - name: Lint
        run: ruff check app models batch tests

      - name: Test
        run: pytest tests/ -v --tb=short

      - name: Build Docker image
        run: docker build -t ml-inference-platform-lab:ci .

